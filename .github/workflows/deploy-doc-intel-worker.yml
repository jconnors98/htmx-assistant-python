name: Deploy Doc-Intel Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - development
    paths:
      - "assistant_services/**"
      - "document_intelligence_*.py"
      - "models/**"
      - "packages/common/doc_intel_contracts.py"
      - "services/doc_intel_worker/**"
      - "tools/**"
      - "requirements.txt"
      - ".github/workflows/deploy-doc-intel-worker.yml"
      - "infra/ecs/doc-intel-worker-task-definition.json"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push worker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ vars.DOC_INTEL_ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" -f services/doc_intel_worker/Dockerfile .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Render ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ vars.DOC_INTEL_TASK_DEFINITION_PATH }}
          container-name: doc-intel-worker
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ vars.DOC_INTEL_ECS_SERVICE }}
          cluster: ${{ vars.DOC_INTEL_ECS_CLUSTER }}
          wait-for-service-stability: true
